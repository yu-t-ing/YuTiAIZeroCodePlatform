spring:
  application:
    name: yuti-ai-code-mother-backend
  # session 配置
  session:
    store-type: redis
    # session 30 天过期
    timeout: 2592000
  # mysql
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/yu_ai_code_mother
    username: root
    password: ${DB_PASSWORD:123456}
  # redis
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      password: ${REDIS_PASSWORD:}
      ttl: 3600 # 缓存过期时间（秒）
  profiles:
    active: local
server:
  port: 8123
  servlet:
    context-path: /api
    # cookie 30 天过期
    session:
      cookie:
        max-age: 2592000
# springdoc-openapi
springdoc:
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.yuti.yutiaicodemother.controller
# knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn
# AI
langchain4j:
  open-ai:
    chat-model:
      base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
      api-key: ${DEEPSEEK_API_KEY}
      model-name: ${DEEPSEEK_MODEL:deepseek-chat}
      strict-json-schema: true
      response-format: json_object
      max-tokens: 8192
      log-requests: false
      log-responses: false
      max-retries: 3
    streaming-chat-model:
      base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
      api-key: ${DEEPSEEK_API_KEY}
      model-name: ${DEEPSEEK_MODEL:deepseek-chat}
      max-tokens: 8192
      log-requests: false
      log-responses: false
    # 推理 AI 模型配置（用于复杂的推理任务）
    reasoning-streaming-chat-model:
      base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
      api-key: ${DEEPSEEK_API_KEY}
      model-name: ${DEEPSEEK_MODEL:deepseek-chat}
      max-tokens: 8192
      temperature: 0.7
      log-requests: false
      log-responses: false
    # 智能路由 AI 模型配置（用于简单的分类任务）
    routing-chat-model:
      base-url: ${DASHSCOPE_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
      api-key: ${DASHSCOPE_API_KEY}
      model-name: ${DASHSCOPE_MODEL:qwen-turbo}
      max-tokens: 100
      log-requests: true
      log-responses: true
# 添加 COS 对象存储配置（需要从腾讯云获取）
cos:
  client:
    host: ${COS_HOST:your-custom-domain.com}
    secretId: ${COS_SECRET_ID}
    secretKey: ${COS_SECRET_KEY}
    region: ${COS_REGION:ap-shanghai}
    bucket: ${COS_BUCKET:your-bucket-name}
# Pexels 图片搜索配置
pexels:
  api-key: ${PEXELS_API_KEY}
# 阿里云 DashScope 配置
dashscope:
  api-key: ${DASHSCOPE_API_KEY}
  image-model: ${DASHSCOPE_IMAGE_MODEL:wan2.2-t2i-flash}
# 监控
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always